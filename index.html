<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>echoo.</title>
    <link rel="icon" type="image/png" href="/favicon2.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Strict CSS Reset & Layout Lock */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            height: 100% !important;
            width: 100% !important;
            overflow: hidden !important; /* Chặn scrollbar toàn trang */
            position: fixed !important; /* Chặn hiệu ứng bounce (kéo lò xo) trên tablet */
            touch-action: none; /* Chỉ cho phép JS xử lý touch, chặn trình duyệt tự cuộn */
            background-color: #848484;
        }

        #root {
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Chặn đứng mọi nỗ lực hiện scrollbar của main */
        main {
            height: 0; 
            flex-grow: 1;
            overflow: hidden !important;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        * {
            box-sizing: border-box;
            font-family: 'Archivo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, input, textarea, button, select {
            font-family: 'Archivo', sans-serif;
            font-weight: 400;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        /* Responsive Card Height Lock */
        .confession-card {
            transition: transform 0.3s ease-in-out;
            margin: 0 !important; /* Remove any margins that might cause overflow */
        }

        @media (max-width: 767px) {
            .confession-card {
                width: 100% !important;
            }
            .app-logo {
                height: 24px !important;
                width: auto !important;
            }
        }
    </style>
